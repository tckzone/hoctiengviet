<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>越南语多维深度动态记忆卡</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="internalAudioPlayer"></audio>
    <audio id="compareAudioPlayer"></audio>

    <div class="container">
        <div id="mainAppZone">
            <div class="config-section">
                <div class="section-title">📁 越南语发音字母组 (点击切换过滤)</div>
                <div id="tagBox" class="tag-container"></div>
                <select id="groupAdder" onchange="addGroupFilter(this.value)">
                    <option value="">+ 添加字母组合过滤...</option>
                    <option value="all">显示全部 (172个)</option>
                    <option value="chu_cai">Bảng chữ cái (a, ă, â...)</option>
                    <option value="phu_am">Phụ âm ghép (ch, kh...)</option>
                    <option value="a">A 组韵母 (ia, ua, ưa...)</option>
                    <option value="e">E 组韵母 (ưi, ay, ây...)</option>
                    <option value="i">I 组韵母 (it, ot, ôt...)</option>
                    <option value="o">O 组韵母 (un, ang, ăng...)</option>
                    <option value="u">U 组韵母 (êm, om, ôm...)</option>
                </select>
                <button class="btn-shuffle" onclick="shuffleCards()">🔀 打乱顺序 / 刷新词组</button>
            </div>

            <div class="card-section">
                <button class="btn-open-compare" onclick="openCompareWindow()">▶ 发音对比</button>
                <div class="progress-text">进度: <span id="currentProgress">0</span>/<span id="totalProgress">0</span></div>
                
                <div class="flashcard-wrapper">
                    <div class="flashcard-inner" id="cardInner" onclick="flipCard()">
                        <div class="card-face card-front">
                            <div class="card-cell-helper"><div class="card-content-box">
                                <div style="font-size:18px; font-weight:bold;">🎵 听音辨词</div>
                                <div style="font-size:12px; opacity:0.8;">点击卡片查看答案</div>
                                <div style="font-size:22px; margin-top:10px; opacity:0.5;">❓ 点击翻转</div>
                            </div></div>
                        </div>
                        <div class="card-face card-back">
                            <div class="card-cell-helper"><div class="card-content-box">
                                <div class="revealed-word" id="wordRevealTarget">---</div>
                                <div style="font-size:15px; color:#666; margin-top:5px;" id="meanRevealTarget">---</div>
                            </div></div>
                        </div>
                    </div>
                </div>

                <div class="action-table">
                    <div class="action-cell"><button style="background:#fff; border:1px solid #ddd;" onclick="flipCard()">🔄 翻转</button></div>
                    <div class="action-cell"><button style="background:#fff; border:1px solid #ddd;" onclick="playSoundDirectly()">🔊 发音</button></div>
                </div>

                <div style="font-size:13px; font-weight:bold; margin:10px 0 5px 0;">请输入越南语单词 (按 Enter 核对):</div>
                <input type="text" id="dictationField" placeholder="键入拼写..." autocomplete="off">
                <div id="alertBox" class="result-message"></div>

                <div class="nav-table">
                    <div class="nav-cell"><button style="background:#f5f5f5; color:#888;" onclick="movePointer(-1)">⬅️ 上一个</button></div>
                    <div class="nav-cell"><button style="background:#5c4cf4; color:#fff;" onclick="movePointer(1)">👉 下一個</button></div>
                </div>
            </div>
        </div>

        <div id="compareWindowModal" class="compare-modal">
            <div class="compare-modal-header">
                <h3>📊 发音对比 (So sánh)</h3>
                <button class="btn-close-modal" onclick="closeCompareWindow()">✕ 返回</button>
            </div>
            <div class="tip-text">💡 勾选单词进行连读对比:</div>
            <div id="compareCheckboxContainer" class="compare-checkbox-grid"></div>
            <div class="compare-output-box">
                <span style="font-size:12px; color:#888;">播放队列:</span>
                <input type="text" id="compareWordsInput" readonly>
            </div>
            <div class="compare-control-panel">
                <button class="btn-ctrl" style="background:#888;" onclick="clearCompareSelection()">🧹 清空</button>
                <button class="btn-ctrl" style="background:#ff4d4f;" onclick="stopComparePlayback()">⏹ 停止</button>
                <button class="btn-ctrl" style="background:#4CAF50;" onclick="startComparePlayback()">🔊 播放</button>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
